kind = "web"
previewPath = "/"
title = "Application de Planification"
version = "1.0.0"
id = "artifacts/planning-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19548
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/planning-app run dev"

[services.env]
PORT = "19548"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/planning-app", "run", "build"]
publicDir = "artifacts/planning-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
